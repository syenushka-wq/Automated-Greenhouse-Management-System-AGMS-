server:
  port: 8080

spring:
  application:
    name: zone-service

  datasource:
    url: jdbc:mysql://localhost:3306/zone_db
    username: root
    password: 1234
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.MySQL8Dialect

  jackson:
    serialization:
      indent-output: true

logging:
  level:
    org.springframework: INFO
    com.agms.zoneservice: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health, info
  health:
    show-details: always