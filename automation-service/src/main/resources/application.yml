server:
  port: 8090

spring:
  application:
    name: automation-service

  datasource:
    url: jdbc:h2:mem:automationdb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  cloud:
    config:
      uri: http://localhost:8888   # Your config-server URL
      fail-fast: true              # Fail if config-server is not available

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/   # Your Eureka server URL
    register-with-eureka: true
    fetch-registry: true

logging:
  level:
    org.springframework: INFO
    com.agms.automationservice: DEBUG