server:
  port: 8761

spring:
  application:
    name: eureka-server
  security:
    user:
      name: eureka-user
      password: eureka-password

eureka:
  instance:
    hostname: localhost
  client:
    register-with-eureka: false
    fetch-registry: false
    service-url:
      defaultZone: http://eureka-user:eureka-password@localhost:8761/eureka/